name: CI

on:
  push:
    branches: [main, claude]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chip: [imxrt1062]
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy
      - run: rustup target add thumbv7em-none-eabihf
      - run: cargo clippy --features=imxrt-ral/${{ matrix.chip }} --target=thumbv7em-none-eabihf -- -D warnings

  build:
    name: Build (${{ matrix.chip }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chip:
          - imxrt1011
          - imxrt1021
          - imxrt1062
          - imxrt1064
          - imxrt1176_cm7
    steps:
      - uses: actions/checkout@v4
      - run: rustup target add thumbv7em-none-eabihf
      - run: cargo build --features=imxrt-ral/${{ matrix.chip }} --target=thumbv7em-none-eabihf

  test:
    name: Test (host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --features=imxrt-ral/imxrt1062 --lib
